<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1>AnimeList</h1>
    <input type="text" id="search" placeholder="Search anime..." />
  </header>

  <!-- FEATURED SECTION -->
  <section class="section">
    <h2>🔥 Featured Anime</h2>

    <div class="carousel-shell">
      <button class="carousel-arrow left" id="featured-left" aria-label="Previous featured anime">‹</button>
      <div class="anime-row" id="featured"></div>
      <button class="carousel-arrow right" id="featured-right" aria-label="Next featured anime">›</button>
    </div>

    <div class="dots" id="featured-dots"></div>
  </section>

  <!-- TOP RATED SECTION -->
  <section class="section">
    <h2>⭐ Top Rated Anime (9.0+)</h2>

    <div class="carousel-shell">
      <button class="carousel-arrow left" id="top-rated-left" aria-label="Previous top rated anime">‹</button>
      <div class="anime-row" id="top-rated"></div>
      <button class="carousel-arrow right" id="top-rated-right" aria-label="Next top rated anime">›</button>
    </div>

    <div class="dots" id="top-rated-dots"></div>
  </section>

  <!-- PERSONALIZED SECTION -->
  <section class="section">
    <h2>🎯 Recommended For You</h2>

    <div class="carousel-shell">
      <button class="carousel-arrow left" id="personalized-left" aria-label="Previous personalized anime">‹</button>
      <div class="anime-row" id="personalized"></div>
      <button class="carousel-arrow right" id="personalized-right" aria-label="Next personalized anime">›</button>
    </div>

    <div class="dots" id="personalized-dots"></div>
  </section>

  <!-- FILTER / BROWSE SECTION -->
  <section class="section">
    <h2>🎬 Browse</h2>

    <div class="filters">

      <p style="color: var(--muted); font-size: 13px;">
  Showing popular genres — click “+ More” to explore all
  </p>

   <div class="genre-picker">
    <p id="genre-limit-msg" style="color: var(--muted); font-size: 12px; display: none;">
  You can select up to 5 genres to keep recommendations relevant
</p>
    <input
     type="text"
     id="genre-search"
     placeholder="Search genres..."
     autocomplete="off"
   />

  <div id="selected-genres" class="selected-genres"></div>

  <div id="genre-options" class="genre-options"></div>
</div>

    <input type="number" id="score" min="5" max="10" step="0.1" placeholder="Min Score (5-10)" />
    <input type="number" id="episodes" min="1" placeholder="Max Episodes" />
      <button onclick="applyFilters()">Apply</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
